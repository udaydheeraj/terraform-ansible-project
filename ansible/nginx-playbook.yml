---
- name: Configure web server
  hosts: web
  become: yes

  tasks:
    
    - name: install nginx
      apt: 
        name: nginx
        state: present
        update_cache: yes


    - name: start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: deploy webpage
      template:
        src: templates/index.j2
        dest: /var/www/html/index.html


